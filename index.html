<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>QRTMS - Alpha Security Services</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
:root{--pri:#1a1a2e;--sec:#e8e0d4;--acc:#2d6a4f;--grn:#2d6a4f;--red:#c1121f;--org:#e76f51;--txt:#1a1a2e;--sub:#6b7280;--bg:#f5f3ef;--card:rgba(255,255,255,0.65);--glass:rgba(255,255,255,0.45);--border:rgba(0,0,0,0.08)}
body{background:var(--bg);color:var(--txt);min-height:100vh}
.qr-header{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.qr-header h1{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:600;letter-spacing:-0.5px}
.qr-header span{font-size:.8rem;color:var(--sub)}
.qr-nav{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 32px;display:flex;overflow-x:auto;gap:0}
.qr-nav button{background:none;border:none;padding:14px 20px;font-size:.85rem;cursor:pointer;white-space:nowrap;color:var(--sub);font-weight:500;border-bottom:2px solid transparent;transition:all .3s}
.qr-nav button.active,.qr-nav button:hover{color:var(--txt);border-bottom-color:var(--txt)}
.qr-section{display:none;padding:32px;max-width:1200px;margin:0 auto}
.qr-section.active{display:block}
.qr-card{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.qr-card h2{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:600;margin-bottom:8px}
.qr-card h3{font-size:1rem;font-weight:600;margin-bottom:12px}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.qr-stat{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;transition:transform .2s,box-shadow .2s}
.qr-stat:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.06)}
.qr-stat .num{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;margin-bottom:4px}
.qr-stat .lbl{font-size:.8rem;color:var(--sub);font-weight:500;text-transform:uppercase;letter-spacing:1px}
.stat-active .num{color:var(--grn)}.stat-term .num{color:var(--red)}.stat-expiry .num{color:var(--org)}
.qr-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-size:.9rem;background:var(--card);backdrop-filter:blur(8px);outline:none;transition:.2s;color:var(--txt)}
.qr-input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(45,106,79,0.1)}
textarea.qr-input{min-height:80px;resize:vertical}
select.qr-input{cursor:pointer}
label,.qr-label{display:block;font-size:.85rem;font-weight:500;color:var(--sub);margin-bottom:6px}
